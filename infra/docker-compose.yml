# Stack de dev — Contract Intelligence (CLM souverain). Cf. docs/architecture.md §5.
# Garde-fous (§7) : Garage (jamais MinIO), Weaviate (jamais pgvector), Mailpit en dev,
# pas de Redis sans besoin concret.
#
# Démarrage (depuis la racine) : `make up` — infra + migrate + API + worker + provisioning
# Garage. Infra seule : `make up-infra` (les services applicatifs sont sous le profil `app`).

name: clm

# Environnement applicatif partagé par api / worker / migrate. Les hôtes pointent
# vers les noms de services du réseau compose (jamais localhost depuis un conteneur).
x-app-env: &app-env
  CI_ENVIRONMENT: dev
  CI_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clm}:${POSTGRES_PASSWORD:-clm}@postgres:5432/${POSTGRES_DB:-clm}
  CI_OIDC_ISSUER: http://keycloak:8080/realms/clm
  CI_OIDC_AUDIENCE: clm-api
  CI_TENANT_CLAIM: tenant
  # DEV uniquement : pas de vérification de signature JWT (le tenant reste lu dans le token).
  CI_AUTH_DEV_INSECURE: "true"
  CI_S3_ENDPOINT_URL: http://garage:3900
  CI_S3_REGION: garage
  CI_S3_BUCKET: contrats
  # Identifiants S3 de DEV déterministes : ceux qu'importe `make provision-garage`
  # (cf. infra/provision-garage.sh). Surchargeables via infra/.env.
  CI_S3_ACCESS_KEY: ${CI_S3_ACCESS_KEY:-GK31c1d34dd99c7b8e51c52940}
  CI_S3_SECRET_KEY: ${CI_S3_SECRET_KEY:-1c1d34dd99c7b8e51c1d34dd99c7b8e51c1d34dd99c7b8e51c1d34dd99c7b8e5}
  CI_TEMPORAL_TARGET: temporal:7233
  CI_TEMPORAL_NAMESPACE: default
  CI_TEMPORAL_TASK_QUEUE: ingestion

# Construction partagée : une seule image pour l'API, le worker et le one-shot migrate.
x-app-build: &app-build
  build:
    context: ..
    dockerfile: Dockerfile
  image: clm-app:dev

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clm}
      POSTGRES_DB: ${POSTGRES_DB:-clm}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  garage:
    image: dxflrs/garage:v1.0.1
    ports:
      - "3900:3900" # S3 API
      - "3902:3902" # S3 web
      - "3903:3903" # admin API
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  garage-webui:
    image: khairul169/garage-webui:latest
    depends_on:
      - garage
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    ports:
      - "3909:3909"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  temporal:
    image: temporalio/temporal:latest
    # L'image tourne en uid 1000 mais le volume `/data` est créé root-owned : sans
    # ceci, le dev-server ne peut pas créer la base SQLite (« unable to open database
    # file »). En root, il écrit dans le volume → persistance de la saga entre restarts.
    user: root
    command:
      ["server", "start-dev", "--ip", "0.0.0.0", "--db-filename", "/data/temporal.db"]
    ports:
      - "7233:7233" # gRPC
      - "8233:8233" # Web UI
    volumes:
      - temporal_data:/data
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s # première mise à jour des signatures

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.25.5
    command: ["--host", "0.0.0.0", "--port", "8080", "--scheme", "http"]
    environment:
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true" # dev uniquement
      DEFAULT_VECTORIZER_MODULE: "none" # BYO vectors (§6) — pas de vectorizer
      ENABLE_MODULES: ""
    ports:
      - "8081:8080" # REST (host 8081 pour éviter le conflit avec Keycloak)
      - "50051:50051" # gRPC
    volumes:
      - weaviate_data:/var/lib/weaviate

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    volumes:
      - mailpit_data:/data

  # --- Application (profil `app`) ------------------------------------------
  # Hors du profil `app`, `docker compose up` ne lance que l'infra ci-dessus.
  # Avec `--profile app` (cf. `make up`), on lance aussi migrate → api + worker.

  # One-shot : applique le schéma + RLS + audit avant que l'app ne démarre.
  migrate:
    <<: *app-build
    profiles: ["app"]
    environment:
      <<: *app-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *app-build
    profiles: ["app"]
    environment:
      <<: *app-env
    command:
      [
        "uvicorn",
        "contract_intelligence.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro # rechargement à chaud du code (uvicorn --reload)
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      garage:
        condition: service_started
    restart: unless-stopped

  worker:
    <<: *app-build
    profiles: ["app"]
    environment:
      <<: *app-env
    command: ["python", "-m", "contract_intelligence.worker.bootstrap"]
    volumes:
      - ../src:/app/src:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  garage_meta:
  garage_data:
  temporal_data:
  weaviate_data:
  mailpit_data:
