name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Lint + types + tests (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv pip install -e ".[api,worker,dev]"

      - name: Ruff (lint)
        run: .venv/bin/ruff check .

      - name: Ruff (format)
        run: .venv/bin/ruff format --check .

      - name: Mypy
        run: .venv/bin/mypy src

      - name: Pytest
        run: .venv/bin/pytest
