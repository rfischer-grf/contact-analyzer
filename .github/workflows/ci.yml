name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Lint + types + tests (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv pip install -e ".[api,worker,db,dev]"

      - name: Ruff (lint)
        run: .venv/bin/ruff check .

      - name: Ruff (format)
        run: .venv/bin/ruff format --check .

      - name: Mypy
        run: .venv/bin/mypy src

      - name: Pytest (hors db)
        run: .venv/bin/pytest -m "not db"

  db:
    name: Migrations + RLS (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clm_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/clm_test
      CI_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/clm_test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv pip install -e ".[api,worker,db,dev]"

      - name: Alembic upgrade head
        run: .venv/bin/alembic upgrade head

      - name: Pytest (db — RLS + audit)
        run: .venv/bin/pytest -m db
